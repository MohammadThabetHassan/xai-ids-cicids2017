name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build documentation site
        run: |
          mkdir -p _site
          
          # Convert docs/index.md to HTML
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>XAI-IDS: Explainable AI Intrusion Detection System</title>
            <style>
              :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
              .hero { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%); color: white; padding: 60px 20px; text-align: center; }
              .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
              .hero p { font-size: 1.2rem; opacity: 0.9; max-width: 700px; margin: 0 auto; }
              .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
              .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin: 30px 0; }
              .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
              .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
              .card h3 { color: var(--primary); margin-bottom: 12px; font-size: 1.2rem; }
              .card ul { padding-left: 20px; }
              .card li { margin: 6px 0; }
              .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin: 4px; }
              .badge-blue { background: #e3f2fd; color: #1565c0; }
              .badge-green { background: #e8f5e9; color: #2e7d32; }
              .badge-orange { background: #fff3e0; color: #e65100; }
              table { width: 100%; border-collapse: collapse; margin: 20px 0; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
              th { background: var(--primary); color: white; padding: 12px 16px; text-align: left; }
              td { padding: 10px 16px; border-bottom: 1px solid #e0e0e0; }
              tr:hover td { background: #f5f5f5; }
              a { color: var(--primary); text-decoration: none; }
              a:hover { text-decoration: underline; }
              .section-title { font-size: 1.8rem; margin: 40px 0 20px; padding-bottom: 10px; border-bottom: 3px solid var(--primary); }
              footer { background: #263238; color: #b0bec5; padding: 30px 20px; text-align: center; margin-top: 60px; }
              code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
              .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
              .team-card { text-align: center; padding: 20px; }
              .team-card h4 { margin-bottom: 4px; }
              .team-card p { color: #666; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <div class="hero">
              <h1>XAI-IDS</h1>
              <p>Explainable AI-based Intrusion Detection System for the CIC-IDS-2017 Dataset</p>
              <div style="margin-top: 20px;">
                <span class="badge badge-blue">Machine Learning</span>
                <span class="badge badge-green">Explainable AI</span>
                <span class="badge badge-orange">Cybersecurity</span>
              </div>
            </div>

            <div class="container">
              <h2 class="section-title">Project Overview</h2>
              <p>
                This project implements an <strong>Explainable AI-based Intrusion Detection System (XAI-IDS)</strong>
                that uses machine learning to classify network traffic from the CIC-IDS-2017 dataset into benign
                and various attack categories. The system employs SHAP and LIME to provide transparent,
                interpretable explanations of its predictions.
              </p>

              <div class="card-grid">
                <div class="card">
                  <h3>ML Models</h3>
                  <ul>
                    <li>Logistic Regression (baseline)</li>
                    <li>Random Forest</li>
                    <li>XGBoost</li>
                  </ul>
                </div>
                <div class="card">
                  <h3>Explainability</h3>
                  <ul>
                    <li>SHAP global feature importance</li>
                    <li>SHAP summary plots</li>
                    <li>LIME local explanations</li>
                    <li>Correct &amp; misclassified samples</li>
                  </ul>
                </div>
                <div class="card">
                  <h3>Evaluation</h3>
                  <ul>
                    <li>Accuracy, Precision, Recall, F1</li>
                    <li>Confusion matrices</li>
                    <li>Normalized confusion matrices</li>
                    <li>Model comparison charts</li>
                  </ul>
                </div>
              </div>

              <h2 class="section-title">Dataset</h2>
              <p>
                The <strong>CIC-IDS-2017</strong> dataset was created by the Canadian Institute for Cybersecurity.
                It contains network traffic data captured over 5 days with both benign activity and common
                attack types including DoS, DDoS, Brute Force, Port Scan, Web Attacks, Botnets, and Infiltration.
              </p>
              <p style="margin-top: 12px;">
                The dataset includes <strong>78 network flow features</strong> extracted using CICFlowMeter and
                <strong>15 traffic classes</strong> (1 benign + 14 attack types).
              </p>

              <h2 class="section-title">Methodology</h2>
              <div class="card-grid">
                <div class="card">
                  <h3>1. Data Preprocessing</h3>
                  <p>Load CSV files, handle missing/infinite values, remove duplicates, encode labels, and standardize features.</p>
                </div>
                <div class="card">
                  <h3>2. Model Training</h3>
                  <p>Train three classifiers with stratified train/validation/test splits (70/10/20).</p>
                </div>
                <div class="card">
                  <h3>3. Evaluation</h3>
                  <p>Compute metrics, generate confusion matrices, and produce comparison charts.</p>
                </div>
                <div class="card">
                  <h3>4. Explainability</h3>
                  <p>Apply SHAP for global feature importance and LIME for local instance-level explanations.</p>
                </div>
              </div>

              <h2 class="section-title">Quick Start</h2>
              <div class="card">
                <pre><code># Clone the repository
          git clone https://github.com/MohammadThabetHassan/Explainable-AI-Intrusion-Detection-System-XAI-IDS-.git
          cd Explainable-AI-Intrusion-Detection-System-XAI-IDS-

          # Install dependencies
          pip install -r requirements.txt

          # Run the full pipeline
          python run_pipeline.py

          # Run with real CIC-IDS-2017 data
          python run_pipeline.py --download</code></pre>
              </div>

              <h2 class="section-title">Team</h2>
              <div class="team-grid">
                <div class="team-card card">
                  <h4>Mohammad Thabet Hassan</h4>
                  <p>Lead Developer &amp; Main Contributor</p>
                  <a href="https://github.com/MohammadThabetHassan">GitHub Profile</a>
                </div>
                <div class="team-card card">
                  <h4>Fahad Sadek</h4>
                  <p>Contributor</p>
                  <a href="https://github.com/fahad6789123">GitHub Profile</a>
                </div>
                <div class="team-card card">
                  <h4>Ahmed Sami</h4>
                  <p>Contributor</p>
                  <a href="https://github.com/AhmedSamiAlameri">GitHub Profile</a>
                </div>
              </div>
              <div class="card" style="margin-top: 20px; text-align: center;">
                <h4>Supervisor</h4>
                <p><strong>Dr. Mehak Khurana</strong></p>
                <p>Mehak.Khurana@cud.ac.ae</p>
              </div>
            </div>

            <footer>
              <p>XAI-IDS &mdash; Explainable AI Intrusion Detection System</p>
              <p style="margin-top: 8px;">
                <a href="https://github.com/MohammadThabetHassan/Explainable-AI-Intrusion-Detection-System-XAI-IDS-" style="color: #90caf9;">
                  View on GitHub
                </a>
              </p>
            </footer>
          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
