name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site/figures _site/plots

          # Copy the main site HTML
          cp docs/site/index.html _site/index.html

          # Copy pipeline figures (outputs/figures/)
          cp outputs/figures/*.png _site/figures/ 2>/dev/null || echo "No pipeline figures"

          # Copy Kaggle notebook plots (plots/)
          cp plots/*.png _site/plots/ 2>/dev/null || echo "No Kaggle plots"

          echo "=== Site build complete ==="
          echo "Figures:"
          ls -la _site/figures/ 2>/dev/null || echo "  (none)"
          echo "Plots:"
          ls -la _site/plots/ 2>/dev/null || echo "  (none)"
          echo "All files:"
          find _site -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
