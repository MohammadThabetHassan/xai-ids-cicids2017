name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from src.utils.logger import setup_logger; print('Logger OK')"
          python -c "from src.data.loader import load_dataset; print('Loader OK')"
          python -c "from src.data.preprocessing import clean_data; print('Preprocessing OK')"
          python -c "from src.models.train import MODEL_CONFIGS; print('Models OK')"
          python -c "from src.evaluation.metrics import compute_metrics; print('Evaluation OK')"
          python -c "from src.explainability.explain import compute_shap_explanations; print('Explainability OK')"
          python -c "from src.evaluation.stats import mcnemar_test; print('Stats OK')"
          python -c "from src.evaluation.drift import detect_feature_drift; print('Drift OK')"
          python -c "from src.evaluation.adversarial import evaluate_adversarial_robustness; print('Adversarial OK')"
          python -c "from src.evaluation.cross_dataset import evaluate_cross_dataset; print('Cross-dataset OK')"
          python -c "from src.explainability.counterfactual import generate_counterfactuals; print('Counterfactuals OK')"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ api/ run_pipeline.py --select E,F,W,I --line-length 120

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Smoke test - generate sample data
        run: |
          python -c "
          from src.data.generate_sample import generate_sample_dataset
          generate_sample_dataset(n_samples=500, output_dir='data/raw', seed=42)
          print('Sample data generated successfully')
          "

      - name: Verify demo model accuracy
        run: |
          python -c "
          import json

          with open('docs/site/data/demo_predictions.json') as f:
              demo_data = json.load(f)

          assert 'dataset' in demo_data, 'Missing dataset field'
          assert 'model' in demo_data, 'Missing model field'
          assert 'features' in demo_data, 'Missing features field'
          assert 'scenarios' in demo_data, 'Missing scenarios field'
          assert len(demo_data['scenarios']) >= 6, f'Only {len(demo_data[\"scenarios\"])} scenarios, expected at least 6'

          for s in demo_data['scenarios']:
              assert 'id' in s, f'Missing id in scenario'
              assert 'features' in s, f'Missing features in scenario {s[\"id\"]}'
              assert 'prediction' in s, f'Missing prediction in scenario {s[\"id\"]}'
              assert 'verdict' in s, f'Missing verdict in scenario {s[\"id\"]}'
              assert len(s['features']) == len(demo_data['features']), f'Feature count mismatch in {s[\"id\"]}'

          print(f'Demo data valid: {len(demo_data[\"scenarios\"])} scenarios, {len(demo_data[\"features\"])} features')
          print('Demo model test passed!')
          "
