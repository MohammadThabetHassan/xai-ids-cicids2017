name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from src.utils.logger import setup_logger; print('Logger OK')"
          python -c "from src.data.loader import load_dataset; print('Loader OK')"
          python -c "from src.data.preprocessing import clean_data; print('Preprocessing OK')"
          python -c "from src.models.train import MODEL_CONFIGS; print('Models OK')"
          python -c "from src.evaluation.metrics import compute_metrics; print('Evaluation OK')"
          python -c "from src.explainability.explain import compute_shap_explanations; print('Explainability OK')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Smoke test - generate sample data
        run: |
          python -c "
          from src.data.generate_sample import generate_sample_dataset
          generate_sample_dataset(n_samples=500, output_dir='data/raw', seed=42)
          print('Sample data generated successfully')
          "

      - name: Verify demo model accuracy
        run: |
          python -c "
          import json
          import math

          with open('docs/site/data/demo_predictions.json') as f:
              demo_data = json.load(f)

          FEATURES = demo_data['features']
          CLASSES = {
              'BENIGN': {'f': [120000, 15, 12, 45000, 38000, 12000, 320, 280, 45000, 85, 1200, 980, 42, 35, 64, 1500, 420, 280, 0, 1], 'w': 1.0, 'key': [0, 3, 4, 5, 8, 16, 17, 19]},
              'DDoS': {'f': [5000, 850, 720, 120, 95, 45, 180, 165, 2500000, 18500, 32000, 28000, 8500, 7200, 64, 1500, 180, 120, 0, 850], 'w': 0.95, 'key': [1, 2, 8, 9, 12, 13, 19]},
              'PortScan': {'f': [2000, 450, 20, 8000, 6500, 3200, 85, 42, 180000, 22500, 18000, 840, 22500, 1000, 64, 64, 64, 0, 0, 450], 'w': 0.90, 'key': [1, 3, 4, 5, 8, 9, 10, 12, 19]},
              'DoS Hulk': {'f': [8000, 320, 280, 25000, 22000, 8500, 450, 420, 850000, 4200, 14400, 11760, 4200, 3680, 128, 1200, 440, 320, 0, 320], 'w': 0.92, 'key': [0, 3, 4, 5, 8, 9, 10, 11, 12, 13]},
              'SSH-Patator': {'f': [350000, 2800, 2750, 180, 165, 55, 120, 95, 42000, 16, 336000, 330000, 8, 7.8, 64, 64, 64, 0, 0, 2800], 'w': 0.88, 'key': [0, 1, 2, 10, 11, 19]},
              'Bot': {'f': [250000, 60, 55, 120000, 100000, 35000, 600, 550, 8000, 12, 6000, 5200, 0.2, 0.18, 90, 1500, 550, 380, 3, 55], 'w': 0.95, 'key': [0, 3, 4, 5, 8, 9, 16, 17, 18, 19]},
              'FTP-Patator': {'f': [420000, 3500, 3450, 150, 135, 48, 110, 88, 38000, 16.6, 420000, 414000, 8.3, 8.2, 64, 64, 64, 0, 0, 3500], 'w': 0.87, 'key': [0, 1, 2, 10, 11, 19]},
              'Web Attack - XSS': {'f': [80000, 150, 120, 30000, 25000, 12000, 800, 650, 500000, 18, 12000, 9800, 1.5, 1.2, 100, 1480, 720, 450, 15, 200], 'w': 0.95, 'key': [1, 2, 6, 7, 8, 10, 11, 18, 19]}
          }
          IMPORTANCE = [0.082, 0.075, 0.068, 0.095, 0.088, 0.062, 0.055, 0.048, 0.072, 0.065, 0.058, 0.052, 0.045, 0.042, 0.038, 0.035, 0.040, 0.032, 0.028, 0.070]
          RANGES = [[0,500000],[0,5000],[0,5000],[0,200000],[0,200000],[0,50000],[0,2000],[0,2000],[0,5000000],[0,30000],[0,500000],[0,500000],[0,30000],[0,30000],[0,2000],[0,2000],[0,2000],[0,2000],[0,20],[0,2000]]

          def feature_similarity(input_val, profile_val, idx):
              mn, mx = RANGES[idx]
              rng = mx - mn
              if rng > 10000:
                  a, b = max(input_val, 0.001), max(profile_val, 0.001)
                  log_r = math.log10(max(mx, 0.001)) - math.log10(max(mn, 0.001))
                  return max(0, 1 - abs(math.log10(a) - math.log10(b)) / max(log_r, 0.001))
              return max(0, 1 - abs(input_val - profile_val) / max(rng, 0.001))

          def score_class(input, cls_name):
              cls = CLASSES[cls_name]
              total, tw, ks, kw = 0, 0, 0, 0
              for i in range(len(FEATURES)):
                  sim = feature_similarity(input[i], cls['f'][i], i)
                  w = IMPORTANCE[i]
                  is_key = i in cls['key']
                  ew = w * 1.5 if is_key else w
                  total += sim * ew
                  tw += ew
                  if is_key:
                      ks += sim * ew
                      kw += ew
              overall = total / tw
              key_score = ks / kw if kw > 0 else overall
              return (overall * 0.6 + key_score * 0.4) * cls['w']

          correct = 0
          for s in demo_data['scenarios']:
              scores = {c: score_class(s['features'], c) for c in CLASSES}
              pred = max(scores, key=scores.get)
              if pred == s['prediction']:
                  correct += 1
                  print(f'  ✓ {s[\"label\"]}: {pred}')
              else:
                  print(f'  ✗ {s[\"label\"]}: expected {s[\"prediction\"]}, got {pred}')

          accuracy = correct / len(demo_data['scenarios'])
          print(f'Demo model accuracy: {correct}/{len(demo_data[\"scenarios\"])} ({accuracy*100:.0f}%)')
          assert accuracy >= 0.875, f'Demo accuracy {accuracy*100:.0f}% is below 87.5% threshold'
          print('Demo model test passed!')
          "
